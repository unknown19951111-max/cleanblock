<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CleanBlock Architecture</title>
  <desc>Request flow through CleanBlock's DNR filter inside Chrome's sandbox</desc>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6e7681"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">

    <text x="28" y="24" font-size="16" font-weight="800" fill="#e6edf3">CleanBlock</text>
    <text x="28" y="40" font-size="11" fill="#6e7681">v0.1.0 proof-of-concept · 25 DNR rules · no telemetry</text>

    <rect x="28" y="62" width="644" height="196" rx="10" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5 4"/>
    <rect x="48" y="54" width="128" height="16" rx="2" fill="#0d1117"/>
    <text x="54" y="65" font-size="8.5" font-weight="800" letter-spacing="1.2" fill="#6e7681">CHROME SANDBOX</text>

    <text x="68" y="160" font-size="12" font-weight="600" fill="#8b949e" text-anchor="middle">Web</text>
    <text x="68" y="175" font-size="12" font-weight="600" fill="#8b949e" text-anchor="middle">requests</text>

    <line x1="104" y1="164" x2="178" y2="164" stroke="#6e7681" stroke-width="1.5" marker-end="url(#a)"/>

    <rect x="188" y="98" width="194" height="132" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="285" y="120" text-anchor="middle" font-size="9" font-weight="800" letter-spacing="1" fill="#58a6ff">DECLARATIVENETREQUEST</text>
    <line x1="204" y1="130" x2="366" y2="130" stroke="#21262d" stroke-width="0.75"/>
    <text x="210" y="152" font-size="12" fill="#e6edf3">Core Ads</text>
    <text x="370" y="152" text-anchor="end" font-size="11" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" fill="#6e7681">10</text>
    <text x="210" y="173" font-size="12" fill="#e6edf3">Privacy Trackers</text>
    <text x="370" y="173" text-anchor="end" font-size="11" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" fill="#6e7681">10</text>
    <text x="210" y="194" font-size="12" fill="#e6edf3">Annoyances</text>
    <text x="370" y="194" text-anchor="end" font-size="11" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" fill="#6e7681">5</text>
    <line x1="204" y1="204" x2="366" y2="204" stroke="#21262d" stroke-width="0.75"/>
    <text x="285" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#6e7681">25 rules</text>

    <line x1="382" y1="164" x2="462" y2="164" stroke="#6e7681" stroke-width="1.5" marker-end="url(#a)"/>

    <text x="478" y="138" font-size="14" font-weight="700" fill="#e6edf3">Your page</text>
    <text x="478" y="158" font-size="11" fill="#8b949e">CleanBlock never sees</text>
    <text x="478" y="173" font-size="11" fill="#8b949e">page content, DOM,</text>
    <text x="478" y="188" font-size="11" fill="#8b949e">cookies, or network.</text>
    <text x="478" y="210" font-size="10" font-weight="700" fill="#f85149">0 outbound requests</text>

    <text x="28" y="290" font-size="8.5" font-weight="800" letter-spacing="1" fill="#6e7681">UPDATE TRUST GATE</text>
    <text x="28" y="308" font-size="11" fill="#8b949e">shape &#x2192; version &#x2192; signature &#x2192; hash &#x2192; rule check</text>
    <text x="28" y="324" font-size="9.5" font-style="italic" fill="#6e7681">scaffold only &#x2014; not live</text>

    <text x="672" y="308" text-anchor="end" font-size="11.5" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" fill="#8b949e">npm run verify</text>
    <text x="672" y="324" text-anchor="end" font-size="10" fill="#6e7681">manifest &#xb7; rulesets &#xb7; privacy &#xb7; trust</text>

  </g>
</svg>
